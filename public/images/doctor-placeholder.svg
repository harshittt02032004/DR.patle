<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1C3252"/>
      <stop offset="100%" stop-color="#0A1628"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0EA5E9"/>
      <stop offset="100%" stop-color="#7DD3FC"/>
    </linearGradient>
  </defs>
  <rect width="400" height="500" fill="url(#bg)"/>
  <!-- subtle grid dots -->
  <g fill="#38BDF8" opacity="0.08">
    <circle cx="40" cy="40" r="2"/><circle cx="120" cy="60" r="2"/><circle cx="340" cy="50" r="2"/>
    <circle cx="360" cy="140" r="2"/><circle cx="50" cy="180" r="2"/><circle cx="330" cy="420" r="2"/>
    <circle cx="60" cy="440" r="2"/><circle cx="200" cy="30" r="2"/>
  </g>
  <!-- person silhouette -->
  <g fill="#7DD3FC" opacity="0.35">
    <circle cx="200" cy="185" r="62"/>
    <path d="M 90 400 Q 90 290 200 290 Q 310 290 310 400 L 310 500 L 90 500 Z"/>
  </g>
  <!-- stethoscope hint -->
  <g stroke="url(#accent)" stroke-width="6" fill="none" opacity="0.65" stroke-linecap="round">
    <path d="M 160 330 Q 160 385 205 385 Q 250 385 250 335"/>
    <circle cx="250" cy="320" r="14" fill="none"/>
  </g>
  <text x="200" y="470" text-anchor="middle" font-family="Georgia, serif" font-size="17" fill="#7DD3FC" opacity="0.8">Photo coming soon</text>
</svg>
